<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elkidom - Step to Success</title>
    <style>
        /* Base styling and background */
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('20260312_133218.jpg'); background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; overflow-x: hidden;
        }
        
        /* Dark overlay to make text readable */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9); z-index: -1;
        }

        /* Main layout container */
        .app-container {
            display: flex; flex-direction: column; min-height: 100vh;
            max-width: 600px; margin: 0 auto; padding: 20px; box-sizing: border-box;
        }

        /* Top Progress Bar */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; margin-top: 10px; }
        .progress-bar-bg { flex-grow: 1; height: 16px; background: #334155; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #58cc02; width: 0%; transition: width 0.4s ease; border-radius: 10px; }
        
        /* Question Area */
        .question-section { flex-grow: 1; }
        h2 { font-size: 24px; margin-bottom: 25px; line-height: 1.4; font-weight: 700; }

        /* Options styling */
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: transparent; border: 2px solid #475569; border-radius: 16px; padding: 18px;
            color: #fff; font-size: 18px; font-weight: 600; text-align: left; cursor: pointer;
            transition: all 0.2s ease;
        }
        .option:hover { background: rgba(255, 255, 255, 0.05); }
        .option.selected { border-color: #38bdf8; background: rgba(56, 189, 248, 0.15); color: #38bdf8; }
        .option.disabled { pointer-events: none; opacity: 0.7; }

        /* Bottom Action Button (before checking) */
        .action-container { margin-top: auto; padding-top: 20px; padding-bottom: 20px; }
        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
            background: #475569; color: #94a3b8; /* Disabled state */
        }
        .btn-main.active { background: #58cc02; color: #fff; box-shadow: 0 4px 0 #58a700; }
        .btn-main.active:active { transform: translateY(4px); box-shadow: 0 0 0 #58a700; }

        /* Sliding Feedback Panel */
        .feedback-panel {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 30px 20px; box-sizing: border-box;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .feedback-panel.show { transform: translateY(0); }
        .feedback-panel.correct { background: #d7ffb8; color: #58a700; }
        .feedback-panel.wrong { background: #ffdfe0; color: #ea2b2b; }
        
        .feedback-title { font-size: 24px; font-weight: 900; width: 100%; max-width: 600px; text-align: left; margin: 0; }
        .feedback-expl { font-size: 16px; font-weight: 500; width: 100%; max-width: 600px; text-align: left; color: #333; margin: 0 0 10px 0; }
        
        .btn-continue {
            width: 100%; max-width: 600px; padding: 16px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .btn-continue.correct-btn { background: #58cc02; color: #fff; box-shadow: 0 4px 0 #46a302; }
        .btn-continue.wrong-btn { background: #ff4b4b; color: #fff; box-shadow: 0 4px 0 #cc3c3c; }
        .btn-continue:active { transform: translateY(4px); box-shadow: none; }

        /* Finish Screen */
        .finish-screen { text-align: center; display: none; flex-direction: column; justify-content: center; height: 80vh; }
        .finish-screen h1 { font-size: 40px; color: #58cc02; margin-bottom: 10px; }
        .finish-screen p { font-size: 20px; color: #cbd5e1; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="overlay"></div>

<audio id="wrongSound" src="wrong.mp3"></audio>

<div class="app-container" id="quiz-app">
    <div class="header">
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <div class="question-section">
        <h2 id="question-text">Loading...</h2>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div class="action-container">
        <button class="btn-main" id="check-btn" disabled onclick="checkAnswer()">Check</button>
    </div>
</div>

<div class="finish-screen" id="finish-screen">
    <h1>Lesson Complete!</h1>
    <p>You scored <span id="final-score"></span> out of 40.</p>
    <button class="btn-main active" onclick="location.reload()">Practice Again</button>
</div>

<div class="feedback-panel" id="feedback-panel">
    <h3 class="feedback-title" id="feedback-title">Awesome!</h3>
    <p class="feedback-expl" id="feedback-expl">Explanation goes here.</p>
    <button class="btn-continue" id="continue-btn" onclick="nextQuestion()">Continue</button>
</div>

<script>
    // 40 Molecular Biology Questions
    const questions = [
        // DNA Replication (1-13)
        { q: "Which enzyme is responsible for 'unzipping' the DNA double helix?", options: ["Helicase", "Primase", "Ligase"], a: 0, ex: "Helicase breaks the hydrogen bonds between base pairs." },
        { q: "In which direction does DNA Polymerase build a new strand?", options: ["3' to 5'", "5' to 3'", "Both directions equally"], a: 1, ex: "DNA polymerase only adds nucleotides to the free 3' end." },
        { q: "What is the role of DNA Ligase?", options: ["Unwinding DNA", "Building RNA primers", "Joining Okazaki fragments"], a: 2, ex: "Ligase acts as the glue to seal gaps in the sugar-phosphate backbone." },
        { q: "Which strand is synthesized continuously during replication?", options: ["Lagging strand", "Leading strand", "Template strand"], a: 1, ex: "The leading strand is built continuously toward the replication fork." },
        { q: "What does Primase do?", options: ["Synthesizes an RNA primer", "Proofreads DNA", "Prevents supercoiling"], a: 0, ex: "Polymerase needs a starting block, which is the RNA primer built by Primase." },
        { q: "What prevents the separated DNA strands from re-attaching?", options: ["Topoisomerase", "Helicase", "Single-strand binding proteins (SSBPs)"], a: 2, ex: "SSBPs coat the separated strands to keep them apart." },
        { q: "DNA replication is considered:", options: ["Conservative", "Semi-conservative", "Dispersive"], a: 1, ex: "Each new double helix contains one old parent strand and one new daughter strand." },
        { q: "Which enzyme relieves the twisting tension ahead of the replication fork?", options: ["Topoisomerase", "Helicase", "DNA Polymerase I"], a: 0, ex: "Topoisomerase cuts and rejoins DNA to prevent supercoiling." },
        { q: "What are the short segments of DNA on the lagging strand called?", options: ["Telomeres", "Okazaki fragments", "Promoters"], a: 1, ex: "Because the lagging strand is built away from the fork, it is made in small chunks." },
        { q: "Which enzyme replaces RNA primers with DNA?", options: ["DNA Polymerase III", "DNA Polymerase I", "Ligase"], a: 1, ex: "Pol I specifically handles removing RNA primers and filling the gap with DNA." },
        { q: "What protects the ends of linear chromosomes from degrading?", options: ["Centromeres", "Telomeres", "Operons"], a: 1, ex: "Telomeres are repetitive junk DNA at the tips of chromosomes." },
        { q: "Where does DNA replication begin?", options: ["Start codon", "Origin of replication", "TATA box"], a: 1, ex: "Replication starts at specific sequences called origins." },
        { q: "What base pairs with Adenine in DNA?", options: ["Uracil", "Cytosine", "Thymine"], a: 2, ex: "Adenine and Thymine form two hydrogen bonds." },
        
        // Transcription (14-26)
        { q: "What is the main product of transcription?", options: ["Polypeptide", "DNA", "mRNA"], a: 2, ex: "Transcription reads DNA to produce messenger RNA." },
        { q: "Which enzyme carries out transcription?", options: ["RNA Polymerase", "DNA Polymerase", "Helicase"], a: 0, ex: "RNA Polymerase binds to DNA and builds the RNA strand." },
        { q: "Where does transcription occur in a eukaryotic cell?", options: ["Cytoplasm", "Nucleus", "Ribosome"], a: 1, ex: "DNA cannot leave the nucleus, so transcription must happen there." },
        { q: "What base replaces Thymine in RNA?", options: ["Guanine", "Uracil", "Cytosine"], a: 1, ex: "In RNA, Adenine pairs with Uracil." },
        { q: "What is the promoter?", options: ["A DNA sequence where RNA Pol binds", "A stop signal", "A protein that unwinds DNA"], a: 0, ex: "The promoter tells RNA Polymerase where a gene starts." },
        { q: "What is the TATA box?", options: ["A type of ribosome", "A eukaryotic promoter sequence", "An intron"], a: 1, ex: "It helps transcription factors and RNA Polymerase bind correctly." },
        { q: "During mRNA processing, what is added to the 5' end?", options: ["Poly-A tail", "Methylguanosine Cap", "An intron"], a: 1, ex: "The 5' cap protects the mRNA and helps ribosomes attach later." },
        { q: "What is removed from pre-mRNA during splicing?", options: ["Exons", "Promoters", "Introns"], a: 2, ex: "Introns are non-coding regions that are 'spliced' out." },
        { q: "What is the purpose of the Poly-A tail?", options: ["To start translation", "To protect mRNA from degradation", "To fold proteins"], a: 1, ex: "A long chain of adenine nucleotides at the 3' end adds stability." },
        { q: "Which strand of DNA matches the mRNA sequence (except for U/T)?", options: ["Coding strand", "Template strand", "Lagging strand"], a: 0, ex: "The mRNA is built off the template strand, so it identically matches the coding strand." },
        { q: "Transcription factors are required for:", options: ["Initiation in eukaryotes", "Termination in prokaryotes", "Splicing"], a: 0, ex: "They help RNA Polymerase recognize the promoter." },
        { q: "What molecule does the spliceosome consist of?", options: ["DNA and proteins", "snRNAs and proteins", "rRNA and lipids"], a: 1, ex: "Small nuclear RNAs complex with proteins to splice introns." },
        { q: "When does transcription stop?", options: ["At a stop codon", "At a terminator sequence", "When the cell divides"], a: 1, ex: "Terminator DNA sequences signal RNA Polymerase to detach." },

        // Translation (27-40)
        { q: "Where does translation occur?", options: ["Nucleus", "Golgi apparatus", "Ribosome"], a: 2, ex: "Ribosomes are the cellular machines that build proteins." },
        { q: "What is a sequence of three mRNA bases called?", options: ["Anticodon", "Codon", "Gene"], a: 1, ex: "A codon codes for one specific amino acid." },
        { q: "Which molecule brings amino acids to the ribosome?", options: ["rRNA", "mRNA", "tRNA"], a: 2, ex: "Transfer RNA (tRNA) physically carries the amino acids." },
        { q: "What is the universal start codon?", options: ["AUG", "UAA", "UAG"], a: 0, ex: "AUG codes for Methionine and tells the ribosome to begin." },
        { q: "What sequence on the tRNA matches the mRNA codon?", options: ["Promoter", "Terminator", "Anticodon"], a: 2, ex: "The anticodon is complementary to the mRNA codon." },
        { q: "What type of bond links amino acids together?", options: ["Hydrogen bond", "Peptide bond", "Ionic bond"], a: 1, ex: "Ribosomes catalyze the formation of peptide bonds." },
        { q: "How many stop codons exist in the standard genetic code?", options: ["One", "Three", "Four"], a: 1, ex: "UAA, UAG, and UGA signal the end of translation." },
        { q: "What happens when a stop codon is reached?", options: ["tRNA adds a stop amino acid", "A release factor binds", "The mRNA breaks apart"], a: 1, ex: "Release factors cause the ribosome to release the new protein." },
        { q: "The genetic code is 'degenerate'. This means:", options: ["It breaks down easily", "Multiple codons can code for the same amino acid", "It varies between humans"], a: 1, ex: "For example, 6 different codons all code for Leucine." },
        { q: "Which ribosomal site holds the tRNA carrying the growing polypeptide chain?", options: ["A site", "P site", "E site"], a: 1, ex: "The P (peptidyl) site holds the growing chain." },
        { q: "What enters the A site of the ribosome?", options: ["Empty tRNA", "The mRNA strand", "The next aminoacyl-tRNA"], a: 2, ex: "The A (aminoacyl) site accepts the incoming tRNA with the next amino acid." },
        { q: "Where do empty tRNAs exit the ribosome?", options: ["A site", "P site", "E site"], a: 2, ex: "The E stands for Exit." },
        { q: "What is a polysome?", options: ["A mutant ribosome", "Multiple ribosomes reading one mRNA", "A folded protein"], a: 1, ex: "Polysomes allow cells to quickly make many copies of a protein." },
        { q: "According to the Wobble Hypothesis, which base in a codon is the most flexible?", options: ["First", "Second", "Third"], a: 2, ex: "The 3rd base pair is less strict, allowing one tRNA to read multiple codons." }
    ];

    let currentIdx = 0;
    let score = 0;
    let selectedOptionIdx = null;

    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const checkBtn = document.getElementById('check-btn');
    const progressBar = document.getElementById('progress');
    const feedbackPanel = document.getElementById('feedback-panel');
    const feedbackTitle = document.getElementById('feedback-title');
    const feedbackExpl = document.getElementById('feedback-expl');
    const continueBtn = document.getElementById('continue-btn');

    function loadQuestion() {
        // Reset states
        selectedOptionIdx = null;
        checkBtn.disabled = true;
        checkBtn.className = 'btn-main';
        feedbackPanel.className = 'feedback-panel'; // Hide panel
        
        // Update progress bar
        progressBar.style.width = `${(currentIdx / questions.length) * 100}%`;

        const q = questions[currentIdx];
        questionText.textContent = q.q;
        optionsContainer.innerHTML = '';

        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.textContent = opt;
            btn.onclick = () => selectOption(idx, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(idx, btnElement) {
        // Remove selected class from all
        const allOptions = document.querySelectorAll('.option');
        allOptions.forEach(opt => opt.classList.remove('selected'));

        // Add to clicked
        btnElement.classList.add('selected');
        selectedOptionIdx = idx;

        // Enable check button
        checkBtn.disabled = false;
        checkBtn.classList.add('active');
    }

    function checkAnswer() {
        const q = questions[currentIdx];
        const isCorrect = (selectedOptionIdx === q.a);
        
        // Disable options so they can't be changed
        const allOptions = document.querySelectorAll('.option');
        allOptions.forEach(opt => opt.classList.add('disabled'));
        
        // Hide Check button to focus on feedback panel
        checkBtn.style.display = 'none';

        if (isCorrect) {
            score++;
            feedbackPanel.classList.add('show', 'correct');
            feedbackTitle.textContent = "Excellent!";
            feedbackExpl.textContent = q.ex;
            continueBtn.className = 'btn-continue correct-btn';
        } else {
            document.getElementById('wrongSound').play(); // Play the user's uploaded sound
            feedbackPanel.classList.add('show', 'wrong');
            feedbackTitle.textContent = "Incorrect";
            feedbackExpl.textContent = `Correct answer was: ${q.options[q.a]}. ${q.ex}`;
            continueBtn.className = 'btn-continue wrong-btn';
        }
    }

    function nextQuestion() {
        currentIdx++;
        checkBtn.style.display = 'block'; // Bring back check button
        
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showFinishScreen();
        }
    }

    function showFinishScreen() {
        document.getElementById('quiz-app').style.display = 'none';
        document.getElementById('feedback-panel').classList.remove('show');
        const finishScreen = document.getElementById('finish-screen');
        finishScreen.style.display = 'flex';
        document.getElementById('final-score').textContent = score;
    }

    // Start the app
    loadQuestion();
</script>

</body>
</html>
